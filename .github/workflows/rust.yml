name: Rust

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: fuckport

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: fuckport-linux-x86_64.tar.gz
            binary_path: target/release/fuckport
            binary_name: fuckport
            archive_kind: tar
          - os: windows-latest
            archive_name: fuckport-windows-x86_64.zip
            binary_path: target/release/fuckport.exe
            binary_name: fuckport.exe
            archive_kind: zip
          - os: macos-latest
            archive_name: fuckport-macos-arm64.tar.gz
            binary_path: target/release/fuckport
            binary_name: fuckport
            archive_kind: tar

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage artifact
        run: |
          mkdir dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.binary_name }}"
        shell: bash

      - name: Create tar.gz archive
        if: matrix.archive_kind == 'tar'
        run: |
          tar -C dist -czf "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
        shell: bash

      - name: Create zip archive
        if: matrix.archive_kind == 'zip'
        run: |
          cd dist
          7z a "../${{ matrix.archive_name }}" "${{ matrix.binary_name }}"
        shell: bash

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
          generate_release_notes: true
